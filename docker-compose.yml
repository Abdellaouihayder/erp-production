version: '3.8'

services:
  db:
    image: postgres:15
    container_name: odoo_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - odoo-db-data:/var/lib/postgresql/data:Z
    networks:
      - odoo-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "odoo"]
      interval: 10s
      retries: 5

  odoo:
    image: odoo:17
    container_name: odoo_app
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - odoo-data:/var/lib/odoo:Z
      - ./config:/etc/odoo:Z
      - ./addons:/mnt/extra-addons:Z
    networks:
      - odoo-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8069 || exit 1"]
      interval: 10s
      retries: 10

  nginx:
    image: nginx:latest
    container_name: odoo_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:Z
      - ./ssl:/etc/nginx/ssl:Z
    depends_on:
      - odoo
    networks:
      - odoo-network

volumes:
  odoo-db-data:
  odoo-data:

networks:
  odoo-network:
    driver: bridge